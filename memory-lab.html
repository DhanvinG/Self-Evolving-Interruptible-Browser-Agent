<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cora Memory Lab</title>
    <link rel="stylesheet" href="memory-lab.css" />
  </head>
  <body>
    <div class="lab-frame">
      <main class="lab-window" aria-label="Spatial memory prototype">
        <button class="window-pill" type="button" aria-label="Memory atlas home">
          <span class="window-pill__mark"></span>
        </button>

        <section class="orb-stage" aria-label="Floating memory field">
          <div class="stage-mist stage-mist--left"></div>
          <div class="stage-mist stage-mist--right"></div>
          <div class="stage-cloud stage-cloud--one"></div>
          <div class="stage-cloud stage-cloud--two"></div>
          <div class="globe-shell" aria-hidden="true"></div>
          <div class="memory-cloud" id="memoryCloud"></div>
        </section>

        <div class="utility-rail" aria-hidden="true">
          <button class="utility-dot utility-dot--active" type="button"></button>
          <button class="utility-dot" type="button"></button>
          <button class="utility-dot" type="button"></button>
          <button class="utility-dot utility-dot--plus" type="button"></button>
        </div>

        <aside class="detail-rail">
          <header class="rail-header">
            <button class="rail-icon" type="button" aria-label="Previous memory">
              <span>&lt;</span>
            </button>
            <button class="rail-icon" type="button" aria-label="Close panel">
              <span>x</span>
            </button>
          </header>

          <div class="rail-scroll">
            <div class="detail-thumb" id="detailThumb" aria-hidden="true"></div>
            <h1 class="detail-title" id="detailTitle">Loading memory...</h1>
            <p class="detail-meta" id="detailMetaLine">Updated just now</p>
            <p class="detail-subtitle" id="detailSubtitle">Focused memory</p>
            <p class="detail-body" id="detailBody"></p>

            <div class="detail-tags">
              <span class="detail-tag" id="detailCategory">Profile</span>
              <span class="detail-tag detail-tag--muted" id="detailUpdated">Updated now</span>
            </div>

            <section class="linked-section">
              <div class="linked-section__head">
                <span>Linked</span>
                <span id="linkedCount">0</span>
              </div>
              <div class="linked-grid" id="linkedGrid"></div>
            </section>

            <section class="conversation-section">
              <div class="linked-section__head">
                <span>Chat</span>
                <span id="conversationCount">0</span>
              </div>
              <div class="conversation-thread" id="conversationThread"></div>
            </section>
          </div>

          <footer class="composer-dock">
            <p class="composer-status" id="statusText">
              Memory Atlas is live. Select a bubble or add a new memory.
            </p>

            <form class="composer-form" id="chatForm">
              <label class="sr-only" for="chatInput">Add a memory</label>
              <input
                id="chatInput"
                type="text"
                autocomplete="off"
                placeholder="Add reply to create new understanding..."
              />
              <button class="composer-send" type="submit" aria-label="Save memory">
                <span></span>
              </button>
            </form>

            <button id="deleteMemoryButton" class="delete-link" type="button">
              Remove selected memory
            </button>
          </footer>
        </aside>
      </main>
    </div>

    <script src="memory-lab.js"></script>
  </body>
</html>
